// ─── DATE & INDEX LOGIC ───────────────────────────────
function getDayOfYear(d){
  const start=new Date(d.getFullYear(),0,0);
  const diff=d-start;
  return Math.floor(diff/86400000);
}

function getOrdinal(n){
  const s=["th","st","nd","rd"];
  const v=n%100;
  return n+(s[(v-20)%10]||s[v]||s[0]);
}

function formatDate(d){
  const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
  return `${days[d.getDay()]}, the ${getOrdinal(d.getDate())} of ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function seededIndex(dayOfYear,year,len){
  const seed=dayOfYear+year*367;
  return ((seed*2654435761)>>>0)%len;
}

// ─── RENDER ───────────────────────────────────────────
const now=new Date();
const doy=getDayOfYear(now);
const yr=now.getFullYear();

document.getElementById("dateDisplay").textContent=formatDate(now);

  });
});

// ─── PARTICLES ────────────────────────────────────────
(function(){
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  let w,h,particles=[];
  const COUNT=45;

  function resize(){
    w=canvas.width=window.innerWidth;
    h=canvas.height=window.innerHeight;
  }
  resize();
  window.addEventListener('resize',resize);

  for(let i=0;i<COUNT;i++){
    particles.push({
      x:Math.random()*w,
      y:Math.random()*h,
      r:Math.random()*1.8+.4,
      dx:(Math.random()-.5)*.15,
      dy:(Math.random()-.5)*.12,
      o:Math.random()*.35+.08
    });
  }

  function draw(){
    ctx.clearRect(0,0,w,h);
    for(const p of particles){
      p.x+=p.dx;p.y+=p.dy;
      if(p.x<0)p.x=w;if(p.x>w)p.x=0;
      if(p.y<0)p.y=h;if(p.y>h)p.y=0;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(196,162,101,${p.o})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
